spring.application.name=vaishnavis-healthcare

# Database Connection (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/clinic_db
spring.datasource.username=clinic
spring.datasource.password=root123
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Settings (This tells Spring to automatically write SQL to create our tables!)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true