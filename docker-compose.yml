services:
  postgres:
    image: postgres:16
    container_name: clinic-postgres
    environment:
      POSTGRES_DB: clinic_db
      POSTGRES_USER: clinic
      POSTGRES_PASSWORD: root123
    ports:
      - "5432:5432"
    volumes:
      - clinic_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinic -d clinic_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: clinic-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/clinic_db
      SPRING_DATASOURCE_USERNAME: clinic
      SPRING_DATASOURCE_PASSWORD: root123
    ports:
      - "8080:8080"

volumes:
  clinic_pgdata:
