spring.application.name=vaishnavis-healthcare

# Database Connection (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/clinic_db
spring.datasource.username=clinic
spring.datasource.password=root123
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Settings (This tells Spring to automatically write SQL to create our tables!)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Application config (bound to com.vaishnavishealthcare.config.AppProperties)
app.env=development
app.jwt.secret=change-this-secret-in-production-minimum-32-chars
app.jwt.issuer=vaishnavis-healthcare
app.jwt.audience=vaishnavis-healthcare-client
app.jwt.validity-seconds=3600